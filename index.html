<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reader PWA | Dashboard</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    
    <div class="app-container dashboard layout">
        <header class="top-nav">
            <div class="brand">
                <h1>Read<span>&Learn</span></h1>
            </div>
            <div class="actions">
                <button id="pwa-install-btn" class="btn secondary hidden" aria-label="Install App">Install App</button>
            </div>
        </header>

        <main class="dashboard-content">
            <section class="welcome-section glass-panel">
                <h2>Welcome back!</h2>
                <p>Continue your English immersion journey.</p>
                
                <div class="file-upload-wrapper">
                    <label for="epub-upload" class="upload-btn btn primary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload EPUB to Read
                    </label>
                    <input type="file" id="epub-upload" accept=".epub" class="hidden-input">
                </div>
            </section>

            <section class="stats-overview">
                <div class="stat-card glass-panel">
                    <div class="stat-icon vocabulary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    </div>
                    <div class="stat-info">
                        <h3>Vocabulary Built</h3>
                        <p class="stat-number" id="total-words">0</p>
                        <span class="stat-label">Saved Words</span>
                    </div>
                </div>

                <div class="stat-card glass-panel">
                    <div class="stat-icon streak">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                    </div>
                    <div class="stat-info">
                        <h3>Current Book</h3>
                        <p class="stat-number" id="read-progress">0%</p>
                        <span class="stat-label">Completion</span>
                    </div>
                </div>
            </section>

            <section class="recent-words-section glass-panel">
                <div class="section-header">
                    <h3>Recent Flashcards</h3>
                    <button class="btn text-btn" id="view-all-words">View All</button>
                </div>
                <div class="words-list" id="words-list">
                    <!-- Words injected here -->
                    <div class="empty-state">
                        <p>No words saved yet. Read a book to start building your vocabulary!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Core Scripts -->
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
