<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Reader | V3.2 Fail-Safe Embed</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/main.css">

    <script src="js/globals.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>

<body class="sepia-theme reader-mode">

    <div class="reader-wrapper" id="reader-wrapper">
        <!-- Top Toolbar -->
        <header class="reader-toolbar glass-panel floating-ui floating-top">
            <button id="btn-back" class="icon-btn" aria-label="Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>

            <div class="book-info">
                <h2 id="book-title" class="truncate">Loading...</h2>
                <!-- Local Book Progress -->
                <div id="book-progress" class="progress-bar thin hidden">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <button onclick="if(window.BossFight) window.BossFight.initFight()" class="btn"
                style="background:var(--error); color:#fff; border-radius:12px; font-weight:bold; font-size:0.8rem; margin-right:10px; padding:4px 10px;">
                👿 Boss Fight
            </button>

            <button id="btn-settings" class="icon-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </header>

        <!-- TTS Sonic Controls -->
        <div id="tts-controller" class="floating-ui floating-bottom hidden" style="bottom: 80px;">
            <div class="tts-controls">
                <button id="tts-prev" class="tts-btn" title="Geri">⏮</button>
                <button id="tts-play" class="tts-btn active-play" title="Oynat/Duraklat">▶️</button>
                <button id="tts-stop" class="tts-btn" title="Durdur">⏹</button>
                <button id="tts-next" class="tts-btn" title="İleri">⏭</button>
            </div>
        </div>

        <!-- Fallback Embed Controls (Plan C) / Loading State -->
        <div id="embed-fallback-bar" class="hidden"
            style="background:var(--warning); color:#000; padding:8px; text-align:center; font-size:0.9rem; font-weight:600;">
            <span id="fallback-text">Kaynak aranıyor...</span>
            <button id="btn-fallback-server" class="btn primary hidden"
                style="padding:4px 8px; font-size:0.8rem; margin-left:10px; background:#000; color:#fff;">
                Alternatif Sunucuyu Dene (Plan C)
            </button>
        </div>

        <!-- Main Reading Area (Multi-Layer) -->
        <main class="book-viewer relative" id="main-viewer">

            <!-- LAYER A: LOCAL BOOKS (EPUB/PDF) -->
            <div id="local-viewer-layer" class="epub-container relative hidden">
                <button id="prev-page" class="nav-btn prev fade" aria-label="Previous">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div id="epub-render-target"></div>
                <canvas id="pdf-canvas" class="hidden"></canvas>
                <button id="next-page" class="nav-btn next fade" aria-label="Next">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- LAYER B: RAW TEXT VIEWER (Single-Fetch Gutenberg) -->
            <div id="text-viewer-layer" class="hidden"
                style="flex-grow:1; display:flex; flex-direction:column; width:100%; height:100%;">

                <!-- V7.8 Premium Action Bar -->
                <div id="premium-action-bar" class="floating-ui floating-top"
                    style="display: flex; gap: 10px; padding: 10px 20px; background: var(--bg-surface); border-bottom: 1px solid rgba(0,0,0,0.1); justify-content: center; top: 55px;">
                    <button id="btn-start-listening" class="btn primary"
                        style="font-weight: bold; border-radius: 20px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); padding: 6px 16px;">🔊
                        Dinlemeyi Başlat</button>
                    <button id="btn-clear-text" class="btn secondary"
                        style="font-weight: bold; border-radius: 20px; padding: 6px 16px;">📜 Metni Temizle</button>
                </div>

                <div id="text-scroll-area"
                    style="overflow-y:auto; padding: 0; box-sizing: border-box; width: 100%; height: 100%; position: relative;">

                    <div id="text-render-target"></div>
                </div>
            </div>

            <!-- LAYER C: EMBED VIEWER (Archive / OpenLibrary) -->
            <iframe id="embed-viewer" class="hidden" style="width:100%; height:100%; border:none;"
                allowfullscreen></iframe>

            <!-- LAYER D: ERROR / AUDIO ONLY -->
            <div id="error-viewer" class="hidden"
                style="display:flex; height:100%; align-items:center; justify-content:center; flex-direction:column; text-align:center;">
                <h2 id="error-title">📖 Kitap Önizlemeye Kapalı</h2>
                <p id="error-desc" style="color:var(--text-secondary); margin-top:10px;">Lütfen farklı bir kitap veya
                    sesli versiyon seçin.</p>
            </div>

        </main>

        <!-- Combo Audio Player (Bottom Fixed) -->
        <section id="audio-player-deck" class="audio-deck glass-panel floating-ui floating-bottom hidden">
            <div class="audio-controls">
                <audio id="combo-audio" controls crossorigin="anonymous"></audio>
                <div class="speed-controls">
                    <span class="speed-label">Hız:</span>
                    <button class="btn text-btn speed-btn" data-speed="0.75">0.75x</button>
                    <button class="btn text-btn speed-btn active" data-speed="1.0">1x</button>
                    <button class="btn text-btn speed-btn" data-speed="1.25">1.25x</button>
                </div>
            </div>
        </section>

        <!-- V8 Elite EPUB Navigation Slider -->
        <div id="epub-slider-container" class="floating-ui floating-bottom"
            style="bottom: 20px; margin: 0 auto; width: 80%; max-width: 400px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;">
            <span id="epub-progress-text" style="font-size: 0.8rem; font-weight: bold; min-width: 40px;">0%</span>
            <input type="range" id="epub-slider" min="0" max="100" value="0" style="flex-grow: 1; cursor: pointer;">
        </div>
    </div>

    <!-- V8 Elite Side Drawer -->
    <div id="side-drawer" class="side-drawer">
        <div class="drawer-header">
            <h3>Okuma Seçenekleri</h3>
            <button id="drawer-close" class="icon-btn" style="font-size: 1.5rem;">&times;</button>
        </div>

        <div class="drawer-section">
            <h4>📖 Sözlük</h4>
            <div id="drawer-dict-content" style="min-height: 80px;">
                <p id="drawer-dict-word" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;">Seçilen
                    Kelime</p>
                <p id="drawer-dict-phonetic"
                    style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px;">...</p>
                <p id="drawer-dict-def" style="margin-bottom: 10px;">Metin içinden bir kelime seçerek çevirisini
                    görebilirsiniz.</p>
                <button id="drawer-dict-save" class="btn primary"
                    style="width: 100%; font-size: 0.8rem; margin-top: 10px;">Kelime Kartını Kaydet</button>
            </div>
        </div>

        <div class="drawer-section">
            <h4>⚙️ Görünüm Ayarları</h4>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn theme-btn" data-theme="light"
                    style="flex:1; background: #fff; color: #000; border: 1px solid #ccc;">Light</button>
                <button class="btn theme-btn" data-theme="sepia"
                    style="flex:1; background: #fbf0d9; color: #3d3024; border: 1px solid #d5c8b2;">Sepia</button>
                <button class="btn theme-btn" data-theme="dark"
                    style="flex:1; background: #1a1a1a; color: #fff; border: 1px solid #333;">Dark</button>
            </div>
        </div>
    </div>
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <script src="js/db.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/dictionary.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/reader.js"></script>
</body>

</html>
